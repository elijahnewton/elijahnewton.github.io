        <a href="services.html" class="nav-link flex items-center space-x-4 p-4 rounded-xl hover:bg-blue-50 text-gray-700 hover:text-blue-900 transition text-lg font-medium hover:translate-x-2 duration-300">

        <!-- --- CONTACT PAGE --- -->
        <div class="page-section">
            <div class="container mx-auto px-4 py-16">
                <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-2xl overflow-hidden flex flex-col md:flex-row">
                    <div class="bg-blue-900 p-10 text-white md:w-2/5 relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-full h-full bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-10"></div>
                        <h2 class="text-3xl font-bold mb-6 relative z-10">Visit Our Office</h2>
                        <div class="space-y-6 relative z-10">
                            <div class="flex items-start">
                                <i data-lucide="map-pin" class="w-6 h-6 text-yellow-400 mr-4 mt-1"></i>
                                <span>Plot 45, Kampala Road<br>Kampala, Uganda</span>
                            </div>
                            <div class="flex items-center">
                                <i data-lucide="phone" class="w-6 h-6 text-yellow-400 mr-4"></i>
                                <span>+256 779 949 750</span>
                            </div>
                            <div class="flex items-center">
                                <i data-lucide="mail" class="w-6 h-6 text-yellow-400 mr-4"></i>
                                <span>info@elitetech.ug</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="p-10 md:w-3/5">
                        <h2 class="text-2xl font-bold text-gray-800 mb-6">Send us a Message</h2>
                        <form onsubmit="return submitForm();" class="space-y-4">
                            <div>
                                <label for="name" class="sr-only">Full Name</label>
                                <input type="text" id="name" placeholder="Full Name" class="w-full px-4 py-3 rounded-lg bg-gray-50 border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition">
                            </div>
                            <div>
                                <label for="email" class="sr-only">Email Address</label>
                                <input type="email" id="email" placeholder="Email Address" class="w-full px-4 py-3 rounded-lg bg-gray-50 border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition">
                            </div>
                            <div>
                                <label for="message" class="sr-only">Project Details</label>
                                <textarea id="message" rows="4" placeholder="Project Details..." class="w-full px-4 py-3 rounded-lg bg-gray-50 border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition"></textarea>
                            </div>
                            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition btn-hover-effect shadow-lg">Submit Inquiry</button>
                        </form>
                    </div>
                </div>
